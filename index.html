<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지점 사진</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }

  header.top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    padding-bottom: 28px;
    border-bottom: 1px solid #242424;
    margin-bottom: 36px;
  }
  .branch-meta { display: flex; flex-direction: column; gap: 8px; }
  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a8a8a;
    font-weight: 500;
  }
  h1.branch-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .photo-count {
    font-size: 14px;
    color: #9a9a9a;
  }

  .download-all {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: #ffffff;
    color: #0f0f0f;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .download-all:hover { background: #e6e6e6; }
  .download-all:active { transform: translateY(1px); }
  .download-all svg { width: 16px; height: 16px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #1a1a1a;
    border-radius: 8px;
    cursor: zoom-in;
    transition: transform 0.2s ease;
  }
  .thumb:hover { transform: translateY(-2px); }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease, opacity 0.2s ease;
    opacity: 0;
  }
  .thumb img.loaded { opacity: 1; }
  .thumb:hover img { transform: scale(1.04); }
  .thumb.missing { cursor: default; }
  .thumb.missing:hover { transform: none; }
  .thumb .missing-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: #5a5a5a;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .thumb .missing-label svg { width: 22px; height: 22px; opacity: 0.5; }
  .thumb .index {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    background: rgba(0,0,0,0.55);
    padding: 4px 8px;
    border-radius: 4px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* Invalid state */
  .invalid {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
  }
  .invalid h2 {
    font-size: 22px;
    font-weight: 600;
    color: #e8e8e8;
    margin-bottom: 12px;
  }
  .invalid p {
    font-size: 14px;
    color: #8a8a8a;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.94);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    color: #e8e8e8;
    flex-shrink: 0;
  }
  .lightbox-counter {
    font-size: 14px;
    color: #c8c8c8;
    font-variant-numeric: tabular-nums;
  }
  .lightbox-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    color: #e8e8e8;
    transition: background 0.15s ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.08); }
  .icon-btn svg { width: 20px; height: 20px; }

  .lightbox-stage {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 0 80px 24px;
  }
  .lightbox-stage img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: #e8e8e8;
    transition: background 0.15s ease;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.14); }
  .nav-btn.prev { left: 16px; }
  .nav-btn.next { right: 16px; }
  .nav-btn svg { width: 24px; height: 24px; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 640px) {
    .container { padding: 28px 16px 64px; }
    h1.branch-name { font-size: 22px; }
    header.top {
      align-items: stretch;
      flex-direction: column;
    }
    .download-all { align-self: flex-start; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .lightbox-stage { padding: 0 8px 16px; }
    .nav-btn { width: 44px; height: 44px; }
    .nav-btn.prev { left: 6px; }
    .nav-btn.next { right: 6px; }
    .lightbox-bar { padding: 12px 12px; }
  }
</style>
</head>
<body>
  
  <div id="app"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="사진 보기">
    <div class="lightbox-bar">
      <div class="lightbox-counter" id="lbCounter">1 / 1</div>
      <div class="lightbox-actions">
        <a id="lbDownload" class="icon-btn" download="" title="이 사진 다운로드" aria-label="이 사진 다운로드">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </a>
        <button class="icon-btn" id="lbClose" title="닫기" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
    <div class="lightbox-stage">
      <button class="nav-btn prev" id="lbPrev" aria-label="이전">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <img id="lbImg" alt="">
      <button class="nav-btn next" id="lbNext" aria-label="다음">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>

<script>
  const BASE_URL = "https://raw.githubusercontent.com/localfriendss/bisangju/main/photos/";

  const branches = {
    "gw-chuncheon-1": { name: "강원춘천1호점", count: 10 },
    "gg-gwangmyeong-1": { name: "경기광명1호점", count: 16 },
    "gg-gunpo-1": { name: "경기군포1호점", count: 19 },
    "gg-namyangju-3": { name: "경기남양주3호점(퇴계원)", count: 16 },
    "gg-namyangju-4": { name: "경기남양주4호점(화도)", count: 10 },
    "gg-bucheon-1": { name: "경기부천1호점", count: 10 },
    "gg-bucheon-2": { name: "경기부천2호점", count: 11 },
    "gg-bundang-1": { name: "경기분당1호점", count: 16 },
    "gg-suwon-1": { name: "경기수원1호점(권선)", count: 10 },
    "gg-suwon-2": { name: "경기수원2호점(영통)", count: 16 },
    "gg-ansan-1": { name: "경기안산1호점", count: 14 },
    "gg-yongin-1": { name: "경기용인1호점(기흥)", count: 10 },
    "gg-yongin-3": { name: "경기용인3호점(처인)", count: 6 },
    "gg-yongin-4": { name: "경기용인4호점(기흥)", count: 10 },
    "gg-uiwang-1": { name: "경기의왕1호점", count: 21 },
    "gg-hanam-1": { name: "경기하남1호점(위례)", count: 7 },
    "gg-hwaseong-1": { name: "경기화성1호점(병점)", count: 24 },
    "gn-jinju-1": { name: "경남진주1호점", count: 11 },
    "goyang-deogyang-1": { name: "고양덕양1호점", count: 10 },
    "gimhae-gusan-1": { name: "김해구산1호점", count: 26 },
    "gimhae-naeoe-1": { name: "김해내외1호점", count: 6 },
    "dg-dong-1": { name: "대구동구1호점", count: 30 },
    "dg-seo-1": { name: "대구서구1호점", count: 4 },
    "dj-yuseong-1": { name: "대전유성구1호점", count: 18 },
    "bs-nam-1": { name: "부산남구1호점", count: 3 },
    "bs-saha-1": { name: "부산사하구1호점", count: 9 },
    "bs-jung-1": { name: "부산중구1호점", count: 8 },
    "seoul-gangnam-1": { name: "서울강남구1호점(직영)", count: 7 },
    "seoul-gangnam-2": { name: "서울강남구2호점", count: 12 },
    "seoul-gangnam-3": { name: "서울강남구3호점", count: 10 },
    "seoul-gangdong-1": { name: "서울강동구1호점(천호)", count: 7 },
    "seoul-gangseo-1": { name: "서울강서구1호점(방화)", count: 15 },
    "seoul-gwanak-1": { name: "서울관악구1호점(사당)", count: 12 },
    "seoul-gwangjin-1": { name: "서울광진구1호점", count: 16 },
    "seoul-ddm-1": { name: "서울동대문구1호점", count: 11 },
    "seoul-mapo-1": { name: "서울마포구1호점(망원)", count: 11 },
    "seoul-mapo-2": { name: "서울마포구2호점(성산)", count: 9 },
    "seoul-seongdong-2": { name: "서울성동구2호점(금호)", count: 17 },
    "seoul-songpa-1": { name: "서울송파구1호점(거여)", count: 18 },
    "seoul-songpa-2": { name: "서울송파구2호점(방이)", count: 11 },
    "seoul-ydp-1": { name: "서울영등포구1호점", count: 8 },
    "seoul-eunpyeong-1": { name: "서울은평구1호점", count: 12 },
    "us-dong-2": { name: "울산동구2호점", count: 21 },
    "ic-gyeyang-1": { name: "인천계양구1호점", count: 8 },
    "ic-namdong-2": { name: "인천남동구2호점(서창)", count: 9 },
    "ic-michuhol-1": { name: "인천미추홀구1호점", count: 15 },
    "ic-bupyeong-1": { name: "인천부평구1호점", count: 15 },
    "ic-yeonsu-1": { name: "인천연수구1호점(송도)", count: 19 },
    "ic-yeonsu-2": { name: "인천연수구2호점(송도)", count: 11 },
    "ilsan-dong-1": { name: "일산동구1호점", count: 7 },
    "jeju-seogwipo-1": { name: "제주서귀포시1호점", count: 16 },
    "cheonan-seobuk-1": { name: "천안서북구1호점", count: 9 },
    "paju-dongpae-1": { name: "파주동패1호점", count: 8 },
    "paju-munsan-1": { name: "파주문산1호점", count: 18 },
    "seoul-gwangjin-3": {name: "서울광진구3호점", count: 3 },
    "seoul-dobong-1": {name: "서울도봉구1호점(방학)", count: 3 },
    "seoul-seocho-1": {name: "서울서초구1호점(양재)", count: 4 },
    "gg-yangpyeong-1": {name: "경기양평1호점", count: 10 },
    "ic-bupyeong-2": { name: "인천부평구2호점", count: 5 }
  };

  const params = new URLSearchParams(window.location.search);
  const branchCode = params.get("branch");
  const app = document.getElementById("app");

  function pad2(n) { return n < 10 ? "0" + n : "" + n; }

  function renderInvalid() {
    app.innerHTML = `
      <div class="invalid">
        <div>
          <h2>유효하지 않은 접근입니다</h2>
          <p>올바른 지점 링크를 통해 접속해 주세요.</p>
        </div>
      </div>
    `;
  }

  function renderBranch(code, branch) {
    const photos = [];
    for (let i = 1; i <= branch.count; i++) {
      photos.push({
        index: i,
        filename: pad2(i) + ".jpg",
        url: BASE_URL + code + "/" + pad2(i) + ".jpg"
      });
    }
    const zipUrl = BASE_URL + code + "/" + code + ".zip";

    app.innerHTML = `
      <div class="container">
        <header class="top">
          <div class="branch-meta">
            <div class="eyebrow">지점 사진</div>
            <h1 class="branch-name"></h1>
            <div class="photo-count">총 ${branch.count}장</div>
          </div>
          <a class="download-all" href="${zipUrl}" download="${code}.zip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            전체 다운로드 (ZIP)
          </a>
        </header>
        <div class="grid" id="grid"></div>
      </div>
    `;
    document.querySelector(".branch-name").textContent = branch.name;
    document.title = branch.name + " 사진";

    const grid = document.getElementById("grid");
    photos.forEach((p, idx) => {
      const a = document.createElement("button");
      a.className = "thumb";
      a.setAttribute("aria-label", branch.name + " 사진 " + p.index);
      a.innerHTML = `
        <img loading="lazy" alt="사진 ${p.index}" src="${p.url}">
        <span class="index">${pad2(p.index)}</span>
      `;
      const img = a.querySelector("img");
      img.addEventListener("load", () => img.classList.add("loaded"));
      const exts = ["jpg", "jpeg", "png", "JPG"];
      img._extIdx = 0;
      img.addEventListener("error", () => {
        img._extIdx = (img._extIdx || 0) + 1;
        if (img._extIdx < exts.length) {
          const newUrl = BASE_URL + code + "/" + pad2(p.index) + "." + exts[img._extIdx];
          p.url = newUrl;
          img.src = newUrl;
          return;
        }
        a.classList.add("missing");
        img.remove();
        const ph = document.createElement("div");
        ph.className = "missing-label";
        ph.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <span>준비 중</span>
        `;
        a.appendChild(ph);
      });
      a.addEventListener("click", () => {
        if (a.classList.contains("missing")) return;
        openLightbox(idx);
      });
      grid.appendChild(a);
    });

    setupLightbox(photos, code, branch);
  }

  // Lightbox
  let lbState = { photos: [], current: 0, code: "", branch: null };

  function setupLightbox(photos, code, branch) {
    lbState.photos = photos;
    lbState.code = code;
    lbState.branch = branch;
  }

  function openLightbox(idx) {
    lbState.current = idx;
    document.getElementById("lightbox").classList.add("active");
    document.body.style.overflow = "hidden";
    updateLightbox();
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
    document.body.style.overflow = "";
  }
  function updateLightbox() {
    const p = lbState.photos[lbState.current];
    if (!p) return;
    const img = document.getElementById("lbImg");
    img.src = p.url;
    img.alt = "사진 " + p.index;
    document.getElementById("lbCounter").textContent = (lbState.current + 1) + " / " + lbState.photos.length;
    const dl = document.getElementById("lbDownload");
    dl.href = p.url;
    dl.setAttribute("download", lbState.code + "_" + p.filename);
    document.getElementById("lbPrev").disabled = lbState.current === 0;
    document.getElementById("lbNext").disabled = lbState.current === lbState.photos.length - 1;
  }
  function navigate(delta) {
    const next = lbState.current + delta;
    if (next < 0 || next >= lbState.photos.length) return;
    lbState.current = next;
    updateLightbox();
  }

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbPrev").addEventListener("click", () => navigate(-1));
  document.getElementById("lbNext").addEventListener("click", () => navigate(1));
  document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target.id === "lightbox" || e.target.classList.contains("lightbox-stage")) closeLightbox();
  });
  document.addEventListener("keydown", (e) => {
    if (!document.getElementById("lightbox").classList.contains("active")) return;
    if (e.key === "Escape") closeLightbox();
    else if (e.key === "ArrowLeft") navigate(-1);
    else if (e.key === "ArrowRight") navigate(1);
  });

  // Touch swipe
  let touchStartX = null;
  const stage = document.querySelector(".lightbox-stage");
  stage.addEventListener("touchstart", (e) => {
    if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
  }, { passive: true });
  stage.addEventListener("touchend", (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) navigate(dx > 0 ? -1 : 1);
    touchStartX = null;
  });

  // Boot
  if (!branchCode || !branches[branchCode]) {
    renderInvalid();
  } else {
    renderBranch(branchCode, branches[branchCode]);
  }
</script>


</body></html>
