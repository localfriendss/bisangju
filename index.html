    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    const doc = new DOMParser().parseFromString(template, 'text/html');

    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

seoul-gwanak-1\": { name: \"서울관악구1호점(사당)\", count: 12 },\n    \"seoul-gwangjin-1\": { name: \"서울광진구1호점\", count: 16 },\n    \"seoul-ddm-1\": { name: \"서울동대문구1호점\", count: 11 },\n    \"seoul-mapo-1\": { name: \"서울마포구1호점(망원)\", count: 10 },\n    \"seoul-mapo-2\": { name: \"서울마포구2호점(성산)\", count: 9 },\n    \"seoul-seongdong-2\": { name: \"서울성동구2호점(금호)\", count: 18 },\n    \"seoul-songpa-1\": { name: \"서울송파구1호점(거여)\", count: 18 },\n    \"seoul-songpa-2\": { name: \"서울송파구2호점(방이)\", count: 11 },\n    \"seoul-ydp-1\": { name: \"서울영등포구1호점\", count: 8 },\n    \"seoul-eunpyeong-1\": { name: \"서울은평구1호점\", count: 12 },\n    \"us-dong-2\": { name: \"울산동구2호점\", count: 21 },\n    \"ic-gyeyang-1\": { name: \"인천계양구1호점\", count: 8 },\n    \"ic-namdong-2\": { name: \"인천남동구2호점(서창)\", count: 9 },\n    \"ic-michuhol-1\": { name: \"인천미추홀구1호점\", count: 15 },\n    \"ic-bupyeong-1\": { name: \"인천부평구1호점\", count: 14 },\n    \"ic-yeonsu-1\": { name: \"인천연수구1호점(송도)\", count: 19 },\n    \"ic-yeonsu-2\": { name: \"인천연수구2호점(송도)\", count: 11 },\n    \"ilsan-dong-1\": { name: \"일산동구1호점\", count: 7 },\n    \"jeju-seogwipo-1\": { name: \"제주서귀포시1호점\", count: 17 },\n    \"cheonan-seobuk-1\": { name: \"천안서북구1호점\", count: 9 },\n    \"paju-dongpae-1\": { name: \"파주동패1호점\", count: 8 },\n    \"paju-munsan-1\": { name: \"파주문산1호점\", count: 18 }\n  };\n\n  const params = new URLSearchParams(window.location.search);\n  const branchCode = params.get(\"branch\");\n  const app = document.getElementById(\"app\");\n\n  function pad2(n) { return n < 10 ? \"0\" + n : \"\" + n; }\n\n  function renderInvalid() {\n    app.innerHTML = `\n      <div class=\"invalid\">\n        <div>\n          <h2>유효하지 않은 접근입니다<\u002Fh2>\n          <p>올바른 지점 링크를 통해 접속해 주세요.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n\n  function renderBranch(code, branch) {\n    const photos = [];\n    for (let i = 1; i <= branch.count; i++) {\n      photos.push({\n        index: i,\n        filename: pad2(i) + \".jpg\",\n        url: BASE_URL + code + \"/\" + pad2(i) + \".jpg\"\n      });\n    }\n    const zipUrl = BASE_URL + code + \"/\" + code + \".zip\";\n\n    app.innerHTML = `\n      <div class=\"container\">\n        <header class=\"top\">\n          <div class=\"branch-meta\">\n            <div class=\"eyebrow\">지점 사진<\u002Fdiv>\n            <h1 class=\"branch-name\"><\u002Fh1>\n            <div class=\"photo-count\">총 ${branch.count}장<\u002Fdiv>\n          <\u002Fdiv>\n          <a class=\"download-all\" href=\"${zipUrl}\" download=\"${code}.zip\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath>\n              <polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline>\n              <line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline>\n            <\u002Fsvg>\n            전체 다운로드 (ZIP)\n          <\u002Fa>\n        <\u002Fheader>\n        <div class=\"grid\" id=\"grid\"><\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    document.querySelector(\".branch-name\").textContent = branch.name;\n    document.title = branch.name + \" 사진\";\n\n    const grid = document.getElementById(\"grid\");\n    photos.forEach((p, idx) => {\n      const a = document.createElement(\"button\");\n      a.className = \"thumb\";\n      a.setAttribute(\"aria-label\", branch.name + \" 사진 \" + p.index);\n      a.innerHTML = `\n        <img loading=\"lazy\" alt=\"사진 ${p.index}\" src=\"${p.url}\">\n        <span class=\"index\">${pad2(p.index)}<\u002Fspan>\n      `;\n      const img = a.querySelector(\"img\");\n      img.addEventListener(\"load\", () => img.classList.add(\"loaded\"));\n      img.addEventListener(\"error\", () => {\n        a.classList.add(\"missing\");\n        img.remove();\n        const ph = document.createElement(\"div\");\n        ph.className = \"missing-label\";\n        ph.innerHTML = `\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"><\u002Frect>\n            <circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"><\u002Fcircle>\n            <polyline points=\"21 15 16 10 5 21\"><\u002Fpolyline>\n          <\u002Fsvg>\n          <span>준비 중<\u002Fspan>\n        `;\n        a.appendChild(ph);\n      });\n      a.addEventListener(\"click\", () => {\n        if (a.classList.contains(\"missing\")) return;\n        openLightbox(idx);\n      });\n      grid.appendChild(a);\n    });\n\n    setupLightbox(photos, code, branch);\n  }\n\n  // Lightbox\n  let lbState = { photos: [], current: 0, code: \"\", branch: null };\n\n  function setupLightbox(photos, code, branch) {\n    lbState.photos = photos;\n    lbState.code = code;\n    lbState.branch = branch;\n  }\n\n  function openLightbox(idx) {\n    lbState.current = idx;\n    document.getElementById(\"lightbox\").classList.add(\"active\");\n    document.body.style.overflow = \"hidden\";\n    updateLightbox();\n  }\n  function closeLightbox() {\n    document.getElementById(\"lightbox\").classList.remove(\"active\");\n    document.body.style.overflow = \"\";\n  }\n  function updateLightbox() {\n    const p = lbState.photos[lbState.current];\n    if (!p) return;\n    const img = document.getElementById(\"lbImg\");\n    img.src = p.url;\n    img.alt = \"사진 \" + p.index;\n    document.getElementById(\"lbCounter\").textContent = (lbState.current + 1) + \" / \" + lbState.photos.length;\n    const dl = document.getElementById(\"lbDownload\");\n    dl.href = p.url;\n    dl.setAttribute(\"download\", lbState.code + \"_\" + p.filename);\n    document.getElementById(\"lbPrev\").disabled = lbState.current === 0;\n    document.getElementById(\"lbNext\").disabled = lbState.current === lbState.photos.length - 1;\n  }\n  function navigate(delta) {\n    const next = lbState.current + delta;\n    if (next < 0 || next >= lbState.photos.length) return;\n    lbState.current = next;\n    updateLightbox();\n  }\n\n  document.getElementById(\"lbClose\").addEventListener(\"click\", closeLightbox);\n  document.getElementById(\"lbPrev\").addEventListener(\"click\", () => navigate(-1));\n  document.getElementById(\"lbNext\").addEventListener(\"click\", () => navigate(1));\n  document.getElementById(\"lightbox\").addEventListener(\"click\", (e) => {\n    if (e.target.id === \"lightbox\" || e.target.classList.contains(\"lightbox-stage\")) closeLightbox();\n  });\n  document.addEventListener(\"keydown\", (e) => {\n    if (!document.getElementById(\"lightbox\").classList.contains(\"active\")) return;\n    if (e.key === \"Escape\") closeLightbox();\n    else if (e.key === \"ArrowLeft\") navigate(-1);\n    else if (e.key === \"ArrowRight\") navigate(1);\n  });\n\n  // Touch swipe\n  let touchStartX = null;\n  const stage = document.querySelector(\".lightbox-stage\");\n  stage.addEventListener(\"touchstart\", (e) => {\n    if (e.touches.length === 1) touchStartX = e.touches[0].clientX;\n  }, { passive: true });\n  stage.addEventListener(\"touchend\", (e) => {\n    if (touchStartX === null) return;\n    const dx = e.changedTouches[0].clientX - touchStartX;\n    if (Math.abs(dx) > 40) navigate(dx > 0 ? -1 : 1);\n    touchStartX = null;\n  });\n\n  // Boot\n  if (!branchCode || !branches[branchCode]) {\n    renderInvalid();\n  } else {\n    renderBranch(branchCode, branches[branchCode]);\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
